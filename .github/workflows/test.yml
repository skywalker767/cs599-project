name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: "true"
      LLM_PROVIDER: mock
      IMAGE_PROVIDER: mock
      OPENAI_API_KEY: ""
      DEEPSEEK_API_KEY: ""
      DATABASE_URL: sqlite:///./storage/test_ci.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify source file formatting (no single-line Python modules)
        run: python scripts/validate_repo_format.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q app tests scripts benchmark.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -m "not slow"
