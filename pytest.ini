[pytest]
markers =
    unit: fast isolated unit tests
    integration: API and workflow integration tests
    slow: longer-running tests such as full benchmark
testpaths = tests
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

[tool:pytest]
addopts = -v --tb=short

[coverage:run]
source = app
omit =
    app/ui/*
    */__init__.py

[coverage:report]
fail_under = 80
show_missing = true
skip_empty = true
